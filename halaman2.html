<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Nunito',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(180deg,#ffeef5,#fff7fb);
}

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 15% 20%,#ffd7e8 0%,transparent 18%),
radial-gradient(circle at 85% 15%,#ffe4f0 0%,transparent 20%),
radial-gradient(circle at 70% 80%,#fff1f7 0%,transparent 22%),
linear-gradient(180deg,#fff6fb,#ffeef6);
z-index:-1;
}

.card{

width:350px;

padding:35px;

border-radius:26px;

background:white;

box-shadow:0 18px 45px rgba(0,0,0,.12);

text-align:center;

}

.icon{

font-size:45px;

margin-bottom:15px;

}

h2{

color:#444;

margin-bottom:15px;

}

p{

color:#777;

line-height:1.7;

}

button{

margin-top:30px;

border:none;

background:#ff7fa8;

color:white;

padding:14px 35px;

font-size:18px;

border-radius:15px;

cursor:pointer;

transition:.25s;

}

button:hover{

transform:scale(1.05);

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="card">

<div class="icon">🐾</div>

<h2>Aku boleh nanya sesuatu?</h2>

<p>
Tenang kok...<br>
Cuma pertanyaan ringan aja 😊
</p>

<button onclick="lanjut()">
Lanjut ➜
</button>

</div>

<script>

function lanjut(){

window.location.href="halaman3.html";

}

</script>

</body>
</html>
