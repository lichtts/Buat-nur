<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>For Nur ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
</div>

<!-- PAGE 1 -->
<div class="card page active" id="page1">

  <div class="ear ear-left"></div>
  <div class="ear ear-right"></div>

  <span class="paw">🐾</span>

  <h1>Apakah kamu Nur?</h1>

  <div class="buttons">
    <button id="yesBtn" class="btn btn-yes">Iya</button>
    <button id="noBtn" class="btn btn-no">Tidak</button>
  </div>

  <p class="reaction" id="reaction1"></p>

</div>

<!-- PAGE 2 -->
<div class="card page" id="page2">

  <div class="ear ear-left"></div>
  <div class="ear ear-right"></div>

  <span class="paw">🐾</span>

  <h1>Ceritain keseharian kamu dong, kepo nih 😚🫣</h1>

  <textarea id="story" placeholder="Tulis di sini..."></textarea>

  <div class="buttons2">
    <button id="nextBtn" class="btn btn-yes">Lanjut</button>
    <button id="kepoBtn" class="btn btn-no">ih kepoo kamu</button>
  </div>

  <p class="reaction" id="reaction2"></p>

</div>

<!-- PAGE 3 -->
<div class="card page" id="page3">

  <div class="ear ear-left"></div>
  <div class="ear ear-right"></div>

  <span class="paw">🐾</span>

  <h1>Ur type cowo kayak gimana? 👀</h1>

  <textarea id="typeCowok" placeholder="Tulis di sini..."></textarea>

  <div class="buttons2">
    <button id="lanjutTypeBtn" class="btn btn-yes">Lanjut</button>
    <button id="lesbianBtn" class="btn btn-no">Eh, aku lesbian deh</button>
  </div>

  <p class="reaction" id="reaction3"></p>

</div>

<!-- PAGE 4 (SPIN WHEEL) -->
<div class="card page" id="page4">

  <div class="ear ear-left"></div>
  <div class="ear ear-right"></div>

  <span class="paw">🐾</span>

  <h1>Ayoo Gachaaaa 🎉</h1>

  <div id="wheel"></div>

  <button id="spinBtn" class="btn btn-yes">SPIN</button>

  <div id="result"></div>

  <p class="reaction" id="reaction4"></p>

</div>

<script src="script.js"></script>

</body>
  </html>
